<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JEE War Room</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="bg"></div>
<canvas id="particles"></canvas>

<nav>
  <div class="logo">⚡ WAR ROOM</div>
  <div class="tabs">
    <button onclick="showTab('pomodoro')">Pomodoro</button>
    <button onclick="showTab('calendar')">Planner</button>
    <button onclick="showTab('vault')">Vault</button>
  </div>
</nav>

<div id="pomodoro" class="tab">

  <div class="dashboard">

    <!-- LEFT PANEL -->
    <div class="panel left">
      <h3>Daily Goals</h3>
      <textarea id="dailyGoals"
        placeholder="Daily goals will appear here..."></textarea>
    </div>

    <!-- CENTER TIMER -->
    <div class="panel center">

      <h1>Focus Session</h1>

      <div class="ring">
        <svg width="320" height="320">
          <circle cx="160" cy="160" r="140" class="bgRing"/>
          <circle cx="160" cy="160" r="140" class="progress" id="progressRing"/>
        </svg>

        <div id="timer">25:00</div>
      </div>

      <div class="controls">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
      </div>

      <p class="mode">Focus Mode 🔥</p>

      <div class="stats">
        Sessions: <span id="sessions">0</span> |
        Streak: <span id="streak">0</span>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="panel right">
      <h3>Session Stats</h3>
      <p>Total Focus: <span id="totalFocus">0</span> min</p>

    </div>

  </div>

</div>

<div id="calendar" class="tab">

  <div class="calendar">

   <div class="calendar">

  <div class="monthBar">
    <button onclick="changeMonth(-1)">←</button>
    <div id="monthTitle"></div>
    <button onclick="changeMonth(1)">→</button>
  </div>

  <div class="grid" id="calendarGrid"></div>

</div>

    <div class="grid" id="calendarGrid"></div>

  </div>

  <!-- EXPANDED DAY VIEW -->
  <div id="dayModal" class="modal">

    <div class="modalCard">

      <button class="closeBtn" onclick="closeModal()">✕</button>

      <h2 id="modalDate">March 3</h2>

      <textarea placeholder="Tasks, goals, notes..."></textarea>

    </div>

  </div>

</div>
<div id="vault" class="tab">

  <div class="vault">

    <h1>Formula Vault</h1>

    <p class="hint">
      Paste screenshots (Ctrl + V) or drag images here
    </p>

    <div id="vaultGrid" class="vaultGrid"></div>

    <div id="viewer" class="viewer">

        <span class="closeViewer" onclick="closeViewer()">✕</span>

        <button class="navBtn prev" onclick="prevImage()">⬅</button>

        <img id="viewerImg">

        <button class="navBtn next" onclick="nextImage()">➡</button>

</div>

  </div>

</div>
<audio id="alarmSound" src="alarm.ogg"></audio>

<script src="script.js"></script>
</body>
</html>
